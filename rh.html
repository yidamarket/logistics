<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>RH 管理系统 团队考勤</title>
    <link rel="stylesheet" href="rh.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="config.js"></script>
    <script src="rh.js" defer></script>
</head>
<body>
    <div class="lang-bar">
        <button class="lang-btn" data-lang="zh">🇨🇳 中文</button>
        <button class="lang-btn" data-lang="en">🇬🇧 English</button>
        <button class="lang-btn" data-lang="fr">🇫🇷 Français</button>
    </div>

    <div class="app-container">
        <div class="nav-bar">
            <button class="back-home" onclick="window.location.href='index.html'">
                <span>🏠</span> <span data-i18n="home">首页</span>
            </button>
            <div class="user-info-bar">
                <div class="datetime-weather">
                    <div class="datetime">
                        <div class="date-box" id="currentDate"></div>
                        <div class="time-box" id="currentTime"></div>
                    </div>
                    <div class="weather-box" id="weatherDisplay">
                        <span class="weather-icon">⏳</span>
                        <span class="weather-temp">--°C</span>
                        <span class="weather-city">Vitry</span>
                    </div>
                </div>
                <div class="user-details">
                    <span class="user-name-badge" id="currentUserDisplay">👤 </span>
                    <span class="user-type-badge" id="userTypeDisplay"></span>
                    <button class="logout-btn" id="logoutBtn" data-i18n="logout">退出登录</button>
                </div>
            </div>
        </div>

        <div class="tabs-container">
            <button class="tab-btn active" data-tab="my-leaves" id="myLeavesTab">📅 <span data-i18n="tab_my_leaves">我的请假</span></button>
            <button class="tab-btn" data-tab="team-calendar" id="calendarTab">📆 <span data-i18n="tab_team_calendar">团队日历</span></button>
            <button class="tab-btn" data-tab="team-leaves" id="teamTab">📋 <span data-i18n="tab_team_leaves">待批请假</span></button>
            <button class="tab-btn" data-tab="pending-cancel" id="pendingCancelTab">📝 <span data-i18n="tab_pending_cancel">待批取消</span></button>
            <button class="tab-btn" data-tab="pending-attendance" id="pendingAttendanceTab">⏳ <span data-i18n="tab_pending_attendance">待批打卡</span></button>
            <button class="tab-btn" data-tab="balances" id="balancesTab">⚖️ <span data-i18n="tab_balances">余额管理</span></button>
            <button class="tab-btn" data-tab="attendance-stats" id="attendanceStatsTab">📊 <span data-i18n="tab_attendance_stats">出勤统计</span></button>
            <button class="tab-btn" data-tab="abnormal-hours" id="abnormalHoursTab">⚠️ <span data-i18n="tab_abnormal_hours">工时异常</span></button>
            <button class="tab-btn" data-tab="employee-management" id="employeeManagementTab">
            👥 <span data-i18n="tab_employee_management">员工管理</span>
            </button>
            <button class="tab-btn" data-tab="my-profile" id="myProfileTab">👤 <span data-i18n="tab_my_profile">我的资料</span></button>
        </div>

        <!-- Tab: 我的请假 -->
        <div id="tab-my-leaves" class="tab-content active">
            <div class="grid-2">
                <div class="section-card">
                    <div class="section-title">📝 <span data-i18n="new_leave_request">新建请假申请</span></div>
                    <div class="input-field"><label data-i18n="leave_type">请假类型</label><select id="leaveType"><option value="">加载中...</option></select></div>
                    <div class="date-range">
                        <div class="input-field"><label data-i18n="start_date">开始日期</label><input type="date" id="startDate"></div>
                        <div class="input-field"><label data-i18n="end_date">结束日期</label><input type="date" id="endDate"></div>
                    </div>
                    <div class="input-field"><label data-i18n="days_count">工作天数</label><input type="number" id="daysCount" readonly></div>
                    <div class="input-field"><label data-i18n="reason">理由</label><textarea id="reason" rows="3" placeholder="请输入请假原因..."></textarea></div>
                    <div class="input-field" id="proofField" style="display:none"><label data-i18n="proof_url">证明文件URL</label><input type="url" id="proofUrl" placeholder="https://..."></div>
                    <button class="btn-primary" id="submitLeaveBtn"><span data-i18n="submit">提交申请</span></button>
                </div>
                <div>
                    <div class="section-card"><div class="section-title">💰 <span data-i18n="my_balance">我的余额</span></div><div id="myBalance"></div></div>
                    <div class="section-card" id="myAttendanceCard"><div class="section-title">⏰ <span data-i18n="my_today_attendance">今日打卡记录</span></div><div class="attendance-history" id="attendanceHistory"><div class="history-item">加载中...</div></div></div>
                </div>
            </div>
            <div class="section-card"><div class="section-title">📋 <span data-i18n="my_leave_history">我的请假历史</span></div><div id="myLeaveRequests"></div></div>
        </div>

        <!-- Tab: 团队日历 -->
        <div id="tab-team-calendar" class="tab-content">
            <div class="section-card">
                <div class="section-title">📆 <span data-i18n="team_planning">团队日程</span></div>
                <div class="month-selector">
                    <div class="month-nav"><button onclick="window.changeMonth(-1)">◀ <span data-i18n="prev_month">上月</span></button><button onclick="window.changeMonth(1)"><span data-i18n="next_month">下月</span> ▶</button></div>
                    <div class="current-month" id="currentMonthDisplay"></div>
                    <button id="exportExcelBtn" class="btn-export" style="display:none">📎 <span data-i18n="export_excel">导出Excel</span></button>
                </div>
                <div class="calendar-container"><table class="team-calendar" id="teamCalendar"><thead id="calendarHeader"></thead><tbody id="calendarBody"></tbody>⁻</table></div>
                <div class="legend">
                    <div class="legend-item"><span class="legend-color working"></span><span data-i18n="legend_present">出勤</span></div>
                    <div class="legend-item"><span class="legend-color absent"></span><span data-i18n="legend_absent">缺勤</span></div>
                    <div class="legend-item"><span class="legend-color leave"></span><span data-i18n="legend_leave">请假</span></div>
                    <div class="legend-item"><span class="legend-color holiday"></span><span data-i18n="legend_holiday">法定假日</span></div>
                    <div class="legend-item"><span class="legend-color overtime"></span><span data-i18n="legend_overtime">加班</span></div>
                    <div class="legend-item"><span class="legend-color weekend"></span><span data-i18n="legend_weekend">周末</span></div>
                    <div class="legend-item"><span class="legend-color mission"></span><span data-i18n="legend_mission">外勤/派送</span></div>
                    <div class="legend-item"><span class="legend-color sick"></span><span data-i18n="legend_sick">病假</span></div>
                    <div class="legend-item"><span class="legend-color halfday"></span><span data-i18n="legend_halfday">半天出勤</span></div>
                </div>
            </div>
        </div>

        <!-- Tab: 待批请假 -->
        <div id="tab-team-leaves" class="tab-content"><div class="section-card"><div class="section-title">⏳ <span data-i18n="pending_leave_requests">待审批请假申请</span></div><div id="pendingLeaveRequests"></div></div></div>

        <!-- Tab: 待批打卡 -->
        <div id="tab-pending-attendance" class="tab-content"><div class="section-card"><div class="section-title">⏳ <span data-i18n="pending_attendance_records">待审批打卡记录（周末/节假日）</span></div><div id="pendingAttendanceList"></div></div></div>

        <!-- Tab: 余额管理 -->
        <div id="tab-balances" class="tab-content"><div class="section-card"><div class="section-title">⚖️ <span data-i18n="all_balances">员工假期余额</span></div><div id="allBalances"></div></div></div>

        <!-- Tab: 员工管理 -->
        <div id="tab-employee-management" class="tab-content">
            <div class="section-card">
                <div class="section-title">👥 <span data-i18n="employee_management">员工管理</span></div>
                <div class="employee-actions" style="display: flex; gap: 12px; margin-bottom: 20px;">
                    <button class="btn-primary" id="addEmployeeBtn" style="width: auto; padding: 10px 20px;">➕ <span data-i18n="add_employee">新增员工</span></button>
                    <input type="text" id="employeeSearchInput" class="search-input" placeholder="🔍 搜索员工..." style="flex: 1; padding: 10px; border-radius: 30px; border: 1px solid #ddd;">
                </div>
                <div id="employeeList" class="employee-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px;"></div>
            </div>
        </div>

       

        <!-- Tab: 待批取消 -->
        <div id="tab-pending-cancel" class="tab-content"><div class="section-card"><div class="section-title">📝 <span data-i18n="pending_cancel_requests">待审批取消申请</span></div><div id="pendingCancelList"></div></div></div>
    <div id="tab-my-profile" class="tab-content">
    <div class="section-card">
        <div class="section-title">👤 <span data-i18n="my_profile">我的资料</span></div>
        <div id="myProfileForm" style="display: grid; gap: 20px; max-width: 600px; margin: 0 auto;">
            <div class="profile-avatar" style="text-align: center; margin-bottom: 10px;">
                <div id="profileAvatar" style="width: 100px; height: 100px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 40px; font-weight: bold; margin: 0 auto 15px;"></div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-field">
                    <label data-i18n="username">用户名</label>
                    <input type="text" id="profile_username" class="modal-input" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
                </div>
                <div class="input-field">
                    <label data-i18n="user_type">员工类型</label>
                    <input type="text" id="profile_user_type" class="modal-input" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; background: #f5f5f5;" readonly disabled>
                </div>
                <div class="input-field">
                    <label data-i18n="phone">电话</label>
                    <input type="text" id="profile_phone" class="modal-input" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
                </div>
                <div class="input-field">
                    <label data-i18n="email">邮箱</label>
                    <input type="email" id="profile_email" class="modal-input" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
                </div>
                <div class="input-field">
                    <label data-i18n="contract_type">合同类型</label>
                    <input type="text" id="profile_contract_type" class="modal-input" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; background: #f5f5f5;" readonly disabled>
                </div>
                <div class="input-field">
                    <label data-i18n="hire_date">入职日期</label>
                    <input type="text" id="profile_hire_date" class="modal-input" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; background: #f5f5f5;" readonly disabled>
                </div>
            </div>
            <div>
                <label data-i18n="address">地址</label>
                <textarea id="profile_address" class="modal-textarea" rows="2" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;"></textarea>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-field">
                    <label data-i18n="birth_date">出生日期</label>
                    <input type="date" id="profile_birth_date" class="modal-input" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
                </div>
                <div class="input-field">
                    <label data-i18n="nationality">国籍</label>
                    <input type="text" id="profile_nationality" class="modal-input" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
                </div>
                <div class="input-field">
                    <label data-i18n="emergency_contact">紧急联系人</label>
                    <input type="text" id="profile_emergency_contact" class="modal-input" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
                </div>
                <div class="input-field">
                    <label data-i18n="emergency_phone">紧急电话</label>
                    <input type="text" id="profile_emergency_phone" class="modal-input" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
                </div>
            </div>
            <div class="input-field">
                <label data-i18n="marital_status">婚姻状况</label>
                <select id="profile_marital_status" class="modal-select" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
                    <option value="single">单身</option>
                    <option value="married">已婚</option>
                    <option value="divorced">离异</option>
                    <option value="widowed">丧偶</option>
                </select>
            </div>
            <div class="input-field">
                <label data-i18n="photo_url">照片URL</label>
                <input type="text" id="profile_photo_url" class="modal-input" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;" placeholder="https://...">
            </div>
            <div class="input-field">
                <label data-i18n="change_password">修改密码</label>
                <input type="password" id="profile_new_password" class="modal-input" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;" placeholder="留空则不修改">
            </div>
            <div class="info-note" style="font-size: 12px; color: #999; text-align: center; padding: 8px; background: #f8f9fa; border-radius: 8px;">
                ℹ️ <span data-i18n="readonly_fields_note">合同类型、入职日期等敏感信息不可修改，请联系管理员</span>
            </div>
            <button id="saveProfileBtn" class="btn-primary" style="margin-top: 10px;">💾 <span data-i18n="save_changes">保存修改</span></button>
        </div>
    </div>
</div>
    </div>
 


    <!-- 模态框（只保留一个，在 app-container 外面） -->
    <div id="customModal" class="custom-modal" style="display: none;">
        <div class="custom-modal-content">
            <div class="custom-modal-header">
                <div class="custom-modal-icon" id="modalIcon">✅</div>
                <div class="custom-modal-title" id="modalTitle"></div>
            </div>
            <div class="custom-modal-body" id="modalMessage"></div>
            <div id="modalSelectContainer" style="display: none;">
                <label class="custom-modal-input-label" id="modalSelectLabel"></label>
                <select class="custom-modal-select" id="modalSelect">
                    <option value="present">✅ 正常出勤</option>
                    <option value="absent">❌ 缺勤</option>
                    <option value="mission">🚚 外勤/派送</option>
                    <option value="sick">🤒 病假</option>
                    <option value="halfday">⏸️ 半天出勤</option>
                </select>
            </div>
            <div id="modalInputContainer" style="display: none;">
                <label class="custom-modal-input-label" id="modalInputLabel"></label>
                <input type="text" class="custom-modal-input" id="modalInput" placeholder="">
            </div>
            <div class="custom-modal-actions" id="modalActions"></div>
        </div>
    </div>
    <div id="addEmployeeModal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 600px;">
        <div class="modal-header">
            <h3>➕ <span data-i18n="add_employee">新增员工</span></h3>
            <button class="modal-close" onclick="closeAddEmployeeModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-field">
                    <label data-i18n="username">用户名 *</label>
                    <input type="text" id="new_username" class="modal-input" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                </div>
                <div class="input-field">
                    <label data-i18n="password">密码 *</label>
                    <input type="password" id="new_password" class="modal-input" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;" value="password123">
                </div>
                <div class="input-field">
                    <label data-i18n="user_type">员工类型</label>
                    <select id="new_user_type" class="modal-select" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                        <option value="chauffeur">🚚 司机</option>
                        <option value="employe">👤 员工</option>
                        <option value="preparateur">📦 备货员</option>
                        <option value="secretaire">📋 秘书</option>
                        <option value="manager">👔 经理</option>
                        <option value="admin">👑 管理员</option>
                    </select>
                </div>
                <div class="input-field">
                    <label data-i18n="phone">电话</label>
                    <input type="text" id="new_phone" class="modal-input" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                </div>
                <div class="input-field">
                    <label data-i18n="email">邮箱</label>
                    <input type="email" id="new_email" class="modal-input" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                </div>
                <div class="input-field">
                    <label data-i18n="contract_type">合同类型</label>
                    <select id="new_contract_type" class="modal-select" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                        <option value="CDI">CDI</option>
                        <option value="CDD">CDD</option>
                        <option value="Interim">Intérim</option>
                        <option value="Stage">Stage</option>
                    </select>
                </div>
                <div class="input-field" style="grid-column: span 2;">
                    <label data-i18n="address">地址</label>
                    <input type="text" id="new_address" class="modal-input" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                </div>
            </div>
        </div>
        <div class="modal-footer" style="display: flex; justify-content: flex-end; gap: 12px; padding: 16px 24px; border-top: 1px solid #eee;">
            <button class="btn-cancel" onclick="closeAddEmployeeModal()" style="background: #f0f0f0; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer;">取消</button>
            <button class="btn-primary" onclick="saveAddEmployee()" style="background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer;">创建</button>
        </div>
    </div>
</div>
<!-- 编辑员工弹窗 -->
<div id="editEmployeeModal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 700px;">
        <div class="modal-header">
            <h3>✏️ <span data-i18n="edit_employee">编辑员工</span></h3>
            <button class="modal-close" onclick="closeEditEmployeeModal()">&times;</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="edit_employee_id">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-field">
                    <label data-i18n="username">用户名</label>
                    <input type="text" id="edit_username" class="modal-input" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                </div>
                <div class="input-field">
                    <label data-i18n="user_type">员工类型</label>
                    <select id="edit_user_type" class="modal-select" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                        <option value="chauffeur">🚚 司机</option>
                        <option value="employe">👤 员工</option>
                        <option value="preparateur">📦 备货员</option>
                        <option value="secretaire">📋 秘书</option>
                        <option value="manager">👔 经理</option>
                        <option value="admin">👑 管理员</option>
                    </select>
                </div>
                <div class="input-field">
                    <label data-i18n="phone">电话</label>
                    <input type="text" id="edit_phone" class="modal-input" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                </div>
                <div class="input-field">
                    <label data-i18n="email">邮箱</label>
                    <input type="email" id="edit_email" class="modal-input" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                </div>
                <div class="input-field" style="grid-column: span 2;">
                    <label data-i18n="address">地址</label>
                    <input type="text" id="edit_address" class="modal-input" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                </div>
                <div class="input-field">
                    <label data-i18n="contract_type">合同类型</label>
                    <select id="edit_contract_type" class="modal-select" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                        <option value="CDI">CDI</option>
                        <option value="CDD">CDD</option>
                        <option value="Interim">Intérim</option>
                        <option value="Stage">Stage</option>
                    </select>
                </div>
                <div class="input-field">
                    <label data-i18n="marital_status">婚姻状况</label>
                    <select id="edit_marital_status" class="modal-select" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                        <option value="single">单身</option>
                        <option value="married">已婚</option>
                        <option value="divorced">离异</option>
                        <option value="widowed">丧偶</option>
                    </select>
                </div>
                <div class="input-field">
                    <label data-i18n="birth_date">出生日期</label>
                    <input type="date" id="edit_birth_date" class="modal-input" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                </div>
                <div class="input-field">
                    <label data-i18n="hire_date">入职日期</label>
                    <input type="date" id="edit_hire_date" class="modal-input" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                </div>
                <div class="input-field">
                    <label data-i18n="nationality">国籍</label>
                    <input type="text" id="edit_nationality" class="modal-input" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;" value="Française">
                </div>
                <div class="input-field">
                    <label data-i18n="conges_payes">带薪假期</label>
                    <input type="number" step="0.5" id="edit_conges_payes" class="modal-input" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                </div>
                <div class="input-field">
                    <label data-i18n="emergency_contact">紧急联系人</label>
                    <input type="text" id="edit_emergency_contact" class="modal-input" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                </div>
                <div class="input-field">
                    <label data-i18n="emergency_phone">紧急电话</label>
                    <input type="text" id="edit_emergency_phone" class="modal-input" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                </div>
                <div class="input-field">
                    <label data-i18n="photo_url">照片URL</label>
                    <input type="text" id="edit_photo_url" class="modal-input" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;" placeholder="https://...">
                </div>
                <div class="input-field">
                    <label data-i18n="status">状态</label>
                    <select id="edit_active" class="modal-select" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                        <option value="true">✅ 在职</option>
                        <option value="false">❌ 离职</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="modal-footer" style="display: flex; justify-content: flex-end; gap: 12px; padding: 16px 24px; border-top: 1px solid #eee;">
            <button class="btn-cancel" onclick="closeEditEmployeeModal()" style="background: #f0f0f0; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer;">取消</button>
            <button class="btn-primary" onclick="saveEditEmployee()" style="background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer;">保存</button>
        </div>
    </div>
</div>

</body>
</html>
